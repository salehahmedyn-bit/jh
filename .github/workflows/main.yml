name: Telegram TTS Bot
on:
  workflow_dispatch: # تشغيل يدوي من تبويب Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # تم التحديث لحل مشكلة linacodec

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 espeak-ng ffmpeg

      - name: Install Python Libraries
        run: |
          # تثبيت المكتبات الأساسية أولاً لضمان التوافق
          pip install --upgrade pip
          pip install torch torchaudio pyTelegramBotAPI soundfile librosa
          # تثبيت متطلبات المشروع الأصلية
          pip install -r requirements.txt

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py
